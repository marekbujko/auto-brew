name: 03. Beta / Test Build

# Auto-builds signed and notarized DMGs for the test and beta branches
# and uploads them as a GitHub Pre-Release. The DMG file name carries
# the branch suffix (AutoBrew-test.dmg / AutoBrew-beta.dmg) so internal
# testers can tell at a glance which channel they grabbed.

on:
  push:
    branches: [test, beta]
  workflow_dispatch:

concurrency:
  group: beta-build-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  APP_NAME: AutoBrew

jobs:
  build:
    name: Build, Sign, Notarize
    uses: marcelrgberger/ci-open-source/.github/workflows/release-macos-app.yml@v1
    with:
      project: AutoBrew.xcodeproj
      scheme: AutoBrew
      app-identifiers: "za.co.digitalfreedom.AutoBrew,za.co.digitalfreedom.AutoBrew.WidgetExtension,za.co.digitalfreedom.AutoBrew.cli"
      team-id: "7TSZJCJY88"
      match-git-url: "git@github.com:marcelrgberger/apple-certificates.git"
      provisioning-profiles: |
        za.co.digitalfreedom.AutoBrew=AutoBrew Developer ID
        za.co.digitalfreedom.AutoBrew.WidgetExtension=AutoBrew Widget Developer ID
        za.co.digitalfreedom.AutoBrew.cli=AutoBrew CLI Developer ID
      artifact-name: autobrew-app
    secrets:
      keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
      asc-api-key:       ${{ secrets.ASC_API_KEY }}
      asc-api-key-id:    ${{ secrets.ASC_API_KEY_ID }}
      asc-issuer-id:     ${{ secrets.ASC_ISSUER_ID }}
      match-ssh-key:     ${{ secrets.MATCH_SSH_KEY }}
      match-password:    ${{ secrets.MATCH_PASSWORD }}

  package:
    name: Package + Pre-Release
    needs: build
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get version
        id: version
        run: |
          VERSION=$(grep MARKETING_VERSION project.yml | head -1 | awk '{print $2}' | tr -d '"')
          BUILD=$(grep CURRENT_PROJECT_VERSION project.yml | head -1 | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "channel=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Download notarized .app
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: build/export

      - name: Materialize ASC API key (for DMG notarization)
        id: asc
        uses: marcelrgberger/ci-open-source/actions/apple-asc-key@v1
        with:
          key-base64: ${{ secrets.ASC_API_KEY }}
          key-id: ${{ secrets.ASC_API_KEY_ID }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}

      - name: Build DMG
        env:
          CHANNEL: ${{ steps.version.outputs.channel }}
        run: |
          set -euo pipefail
          mkdir -p build/dmg
          cp -R "build/export/$APP_NAME.app" build/dmg/
          ln -s /Applications build/dmg/Applications

          DMG_NAME="${APP_NAME}-${CHANNEL}.dmg"
          hdiutil create -volname "$APP_NAME" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            "build/$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"
          echo "DMG_PATH=build/$DMG_NAME" >> "$GITHUB_ENV"

      - name: Code-sign DMG
        uses: marcelrgberger/ci-open-source/actions/macos-codesign-dmg@v1
        with:
          dmg-path: ${{ env.DMG_PATH }}

      - name: Notarize DMG
        uses: marcelrgberger/ci-open-source/actions/macos-notarize@v1
        with:
          bundle-path: ${{ env.DMG_PATH }}
          api-key-path: ${{ steps.asc.outputs.key-path }}
          api-key-id: ${{ steps.asc.outputs.key-id }}
          api-issuer-id: ${{ steps.asc.outputs.issuer-id }}

      - name: Bundle the .app as a ZIP too
        run: |
          ditto -c -k --keepParent "build/export/$APP_NAME.app" "build/$APP_NAME.zip"

      - name: Create or update Pre-Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
          CHANNEL: ${{ steps.version.outputs.channel }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}-${CHANNEL}"
          TITLE="AutoBrew ${VERSION} (${CHANNEL})"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          fi

          {
            echo "## $TITLE"
            echo ""
            echo "Build $BUILD from the $CHANNEL channel."
            echo ""
            echo "Download \`$DMG_NAME\`, open it, and drag AutoBrew to Applications."
          } > build/release-notes.md

          gh release create "$TAG" \
            --title "$TITLE" \
            --prerelease \
            --notes-file build/release-notes.md \
            "$DMG_PATH" \
            "build/$APP_NAME.zip"

      - name: Job Summary
        if: always()
        run: |
          {
            echo "## Beta / Test Build Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Channel | $GITHUB_REF_NAME |"
            echo "| Version | ${{ steps.version.outputs.version }} (${{ steps.version.outputs.build }}) |"
            echo "| Status | ${{ job.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"
