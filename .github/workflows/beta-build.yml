name: 03. Beta / Test Build

# Auto-builds signed and notarized DMGs for the test and beta branches
# and uploads them as a GitHub Pre-Release. The DMG file name carries
# the branch suffix (AutoBrew-test.dmg / AutoBrew-beta.dmg) so internal
# testers can tell at a glance which channel they grabbed.

on:
  push:
    branches: [test, beta]
  workflow_dispatch:

concurrency:
  group: beta-build-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  APP_NAME: AutoBrew
  SCHEME: AutoBrew

jobs:
  build:
    name: Build, Sign, Notarize
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Set up Xcode ^26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '^26'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          bash scripts/patch-localizations.sh || true

      - name: Get version
        id: version
        run: |
          VERSION=$(grep MARKETING_VERSION project.yml | head -1 | awk '{print $2}' | tr -d '"')
          BUILD=$(grep CURRENT_PROJECT_VERSION project.yml | head -1 | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "channel=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Install Developer ID Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_GITHUB_KEYCHAIN_PASSWORD }}
        run: |
          set -e
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v

      - name: Prepare App Store Connect API Key
        env:
          API_KEY_BASE64: ${{ secrets.MACOS_APPSTORE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.MACOS_APPSTORE_API_KEY_ID }}
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo -n "$API_KEY_BASE64" | base64 --decode \
            > "$RUNNER_TEMP/private_keys/AuthKey_${API_KEY_ID}.p8"
          echo "API_KEY_PATH=$RUNNER_TEMP/private_keys/AuthKey_${API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$APP_NAME.xcodeproj" \
            -scheme "$SCHEME"

      - name: Archive
        env:
          TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project "$APP_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -archivePath "build/$APP_NAME.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID"

      - name: Export app
        env:
          TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          cat > build/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "build/$APP_NAME.xcarchive" \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Notarize app
        env:
          API_KEY_ID: ${{ secrets.MACOS_APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.MACOS_APPSTORE_API_ISSUER_ID }}
        run: |
          set -e
          APP_PATH="build/export/$APP_NAME.app"
          ditto -c -k --keepParent "$APP_PATH" "build/$APP_NAME.zip"

          xcrun notarytool submit "build/$APP_NAME.zip" \
            --key "$API_KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"

      - name: Create suffixed DMG
        env:
          API_KEY_ID: ${{ secrets.MACOS_APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.MACOS_APPSTORE_API_ISSUER_ID }}
          CHANNEL: ${{ steps.version.outputs.channel }}
        run: |
          set -e
          mkdir -p build/dmg
          cp -R "build/export/$APP_NAME.app" build/dmg/
          ln -s /Applications build/dmg/Applications

          DMG_NAME="${APP_NAME}-${CHANNEL}.dmg"
          hdiutil create -volname "$APP_NAME" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            "build/$DMG_NAME"

          xcrun notarytool submit "build/$DMG_NAME" \
            --key "$API_KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait

          xcrun stapler staple "build/$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Create or update Pre-Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
          CHANNEL: ${{ steps.version.outputs.channel }}
        run: |
          set -e
          TAG="v${VERSION}-${CHANNEL}"
          TITLE="AutoBrew ${VERSION} (${CHANNEL})"

          # Replace any existing pre-release for this version+channel so the
          # latest artefact is always the canonical download for testers.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          fi

          {
            echo "## $TITLE"
            echo ""
            echo "Build $BUILD from the $CHANNEL channel."
            echo ""
            echo "Download \`$DMG_NAME\`, open it, and drag AutoBrew to Applications."
          } > build/release-notes.md

          gh release create "$TAG" \
            --title "$TITLE" \
            --prerelease \
            --notes-file build/release-notes.md \
            "build/$DMG_NAME" \
            "build/$APP_NAME.zip"

      - name: Job Summary
        if: always()
        run: |
          {
            echo "## Beta / Test Build Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Channel | $GITHUB_REF_NAME |"
            echo "| Version | ${{ steps.version.outputs.version }} (${{ steps.version.outputs.build }}) |"
            echo "| Build | ${{ job.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/private_keys/"*.p8 || true
