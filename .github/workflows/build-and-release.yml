name: 04. Release Build (Main)

on:
  # Manual only - running on every push to main produced a release per
  # commit (including doc-only pushes). Trigger from the Actions tab
  # via Run workflow when an actual release is ready.
  workflow_dispatch:

concurrency:
  group: macos-build-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  APP_NAME: AutoBrew
  SCHEME: AutoBrew

jobs:
  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.determine.outputs.environment }}
    steps:
      - name: Determine environment
        id: determine
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          case "$BRANCH" in
            main)   echo "environment=prod" >> "$GITHUB_OUTPUT" ;;
            *)      echo "environment=dev" >> "$GITHUB_OUTPUT" ;;
          esac

  build:
    name: Build, Sign & Notarize
    if: github.ref == 'refs/heads/main'
    runs-on: macos-26
    timeout-minutes: 30
    needs: determine-environment
    steps:
      - name: Set up Xcode ^26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '^26'

      - name: Checkout
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          bash scripts/patch-localizations.sh || true

      - name: Get version
        id: version
        run: |
          VERSION=$(grep MARKETING_VERSION project.yml | head -1 | awk '{print $2}' | tr -d '"')
          BUILD=$(grep CURRENT_PROJECT_VERSION project.yml | head -1 | awk '{print $2}' | tr -d '"')
          MIN_OS=$(grep MACOSX_DEPLOYMENT_TARGET project.yml | head -1 | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "min_os=$MIN_OS" >> "$GITHUB_OUTPUT"

      - name: Install Developer ID Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_GITHUB_KEYCHAIN_PASSWORD }}
        run: |
          set -e
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v
          echo "Developer ID certificate imported."

      - name: Install Developer ID provisioning profiles
        env:
          PROFILE_MAIN_BASE64: ${{ secrets.MACOS_DEVID_PROFILE_MAIN }}
          PROFILE_WIDGET_BASE64: ${{ secrets.MACOS_DEVID_PROFILE_WIDGET }}
        run: |
          set -e
          # Widget extensions are sandboxed and need a real provisioning
          # profile. Both bundles have a MAC_APP_DIRECT profile generated
          # via the ASC API and stored as base64 secrets — install them
          # into the user-level profile store so xcodebuild picks them
          # up during the archive step.
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo -n "$PROFILE_MAIN_BASE64"   | base64 --decode -o "$PROFILES_DIR/AutoBrew_Main.mobileprovision"
          echo -n "$PROFILE_WIDGET_BASE64" | base64 --decode -o "$PROFILES_DIR/AutoBrew_Widget.mobileprovision"
          ls -la "$PROFILES_DIR"

      - name: Prepare App Store Connect API Key
        env:
          API_KEY_BASE64: ${{ secrets.MACOS_APPSTORE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.MACOS_APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.MACOS_APPSTORE_API_ISSUER_ID }}
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo -n "$API_KEY_BASE64" | base64 --decode \
            > "$RUNNER_TEMP/private_keys/AuthKey_${API_KEY_ID}.p8"
          echo "API_KEY_PATH=$RUNNER_TEMP/private_keys/AuthKey_${API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$APP_NAME.xcodeproj" \
            -scheme "$SCHEME"

      - name: Archive
        env:
          TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          # Manual signing with explicit Developer-ID profiles per
          # target. Automatic signing on a Developer-ID distribution
          # archive picks "Mac Development" certs (wrong path); the
          # MAC_APP_DIRECT profiles installed in the prior step let
          # Manual pick the right identity for both the main app and
          # the sandboxed widget extension.
          xcodebuild archive \
            -project "$APP_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -archivePath "build/$APP_NAME.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID"

      - name: Export app
        env:
          TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          cat > build/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "build/$APP_NAME.xcarchive" \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Notarize app
        env:
          API_KEY_ID: ${{ secrets.MACOS_APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.MACOS_APPSTORE_API_ISSUER_ID }}
        run: |
          set -e
          APP_PATH="build/export/$APP_NAME.app"
          ditto -c -k --keepParent "$APP_PATH" "build/$APP_NAME.zip"

          xcrun notarytool submit "build/$APP_NAME.zip" \
            --key "$API_KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        env:
          API_KEY_ID: ${{ secrets.MACOS_APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.MACOS_APPSTORE_API_ISSUER_ID }}
          TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          set -e
          mkdir -p build/dmg
          cp -R "build/export/$APP_NAME.app" build/dmg/
          ln -s /Applications build/dmg/Applications

          hdiutil create -volname "$APP_NAME" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            "build/$APP_NAME.dmg"

          # Sign the DMG container with the same Developer ID identity.
          # Without this step, Gatekeeper accepts the notarised .app
          # inside but rejects the .dmg double-click with "source=no
          # usable signature" — and brew audit refuses to ship the cask
          # to homebrew/cask. notarytool happily accepts an unsigned
          # DMG, so missing this step is silently downstream-breaking.
          codesign --sign "Developer ID Application: Berger & Rosenstock GbR ($TEAM_ID)" \
                   --options runtime \
                   --timestamp \
                   "build/$APP_NAME.dmg"

          xcrun notarytool submit "build/$APP_NAME.dmg" \
            --key "$API_KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait

          xcrun stapler staple "build/$APP_NAME.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: AutoBrew-${{ steps.version.outputs.version }}
          path: |
            build/AutoBrew.dmg
            build/AutoBrew.zip

      - name: Sign update for Sparkle
        if: github.ref == 'refs/heads/main'
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -e
          # Get Sparkle tools from SPM cache
          SPARKLE_BIN=$(find "$HOME/Library/Developer/Xcode/DerivedData" -name "sign_update" -path "*/Sparkle/bin/*" 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            echo "sign_update not found, downloading Sparkle tools..."
            curl -sL "https://github.com/sparkle-project/Sparkle/releases/latest/download/Sparkle-2.9.0.tar.xz" | tar xJ -C /tmp
            SPARKLE_BIN="/tmp/bin/sign_update"
          fi

          # Sign the ZIP
          echo "$SPARKLE_KEY" > /tmp/sparkle_key
          SIGNATURE=$("$SPARKLE_BIN" "build/$APP_NAME.zip" --ed-key-file /tmp/sparkle_key 2>&1 | grep "sparkle:edSignature" | sed 's/.*sparkle:edSignature="\([^"]*\)".*/\1/')
          LENGTH=$(stat -f%z "build/$APP_NAME.zip")
          rm -f /tmp/sparkle_key

          echo "SPARKLE_SIGNATURE=$SIGNATURE" >> "$GITHUB_ENV"
          echo "ZIP_LENGTH=$LENGTH" >> "$GITHUB_ENV"

      - name: Generate Sparkle binary delta
        if: github.ref == 'refs/heads/main'
        id: delta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
        run: |
          set -e
          # Find the most recent stable release (skipping the one we are
          # about to create — gh release create runs further below — and
          # any prereleases like v2.3.0-test / -beta).
          PREVIOUS_TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 20 \
            --json tagName,isPrerelease \
            --jq "[.[] | select(.isPrerelease == false) | .tagName] | map(select(. != \"v$VERSION\")) | first" \
            2>/dev/null || true)
          if [ -z "${PREVIOUS_TAG:-}" ] || [ "$PREVIOUS_TAG" = "null" ]; then
            echo "No prior stable release found — skipping Sparkle delta."
            echo "have_delta=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Generating delta from $PREVIOUS_TAG"

          mkdir -p build/prev
          if ! gh release download "$PREVIOUS_TAG" --repo "$GITHUB_REPOSITORY" \
              --pattern "AutoBrew.zip" --dir build/prev 2>/dev/null; then
            echo "Previous release has no AutoBrew.zip asset — skipping delta."
            echo "have_delta=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ditto -xk "build/prev/AutoBrew.zip" "build/prev/extract"
          PREV_APP="build/prev/extract/AutoBrew.app"
          if [ ! -d "$PREV_APP" ]; then
            echo "Previous ZIP did not contain AutoBrew.app — skipping delta."
            echo "have_delta=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PREV_BUILD=$(defaults read "$PWD/$PREV_APP/Contents/Info" CFBundleVersion)
          if [ "$PREV_BUILD" = "$BUILD" ]; then
            echo "Previous build $PREV_BUILD matches current — skipping delta."
            echo "have_delta=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BINARY_DELTA=$(find "$HOME/Library/Developer/Xcode/DerivedData" -name "BinaryDelta" -path "*/Sparkle/bin/*" 2>/dev/null | head -1)
          if [ -z "$BINARY_DELTA" ]; then
            BINARY_DELTA="/tmp/bin/BinaryDelta"
          fi
          if [ ! -x "$BINARY_DELTA" ]; then
            echo "BinaryDelta tool not found — skipping delta generation."
            echo "have_delta=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DELTA_FILE="AutoBrew-${PREV_BUILD}-${BUILD}.delta"
          DELTA_PATH="build/$DELTA_FILE"
          "$BINARY_DELTA" create "$PREV_APP" "build/export/AutoBrew.app" "$DELTA_PATH"

          SPARKLE_BIN=$(find "$HOME/Library/Developer/Xcode/DerivedData" -name "sign_update" -path "*/Sparkle/bin/*" 2>/dev/null | head -1)
          SPARKLE_BIN="${SPARKLE_BIN:-/tmp/bin/sign_update}"
          echo "$SPARKLE_KEY" > /tmp/sparkle_key
          DELTA_SIG=$("$SPARKLE_BIN" "$DELTA_PATH" --ed-key-file /tmp/sparkle_key 2>&1 | grep "sparkle:edSignature" | sed 's/.*sparkle:edSignature="\([^"]*\)".*/\1/')
          rm -f /tmp/sparkle_key
          DELTA_LEN=$(stat -f%z "$DELTA_PATH")

          echo "have_delta=true"      >> "$GITHUB_OUTPUT"
          echo "delta_file=$DELTA_FILE" >> "$GITHUB_OUTPUT"
          echo "delta_path=$DELTA_PATH" >> "$GITHUB_OUTPUT"
          echo "delta_from=$PREV_BUILD" >> "$GITHUB_OUTPUT"
          echo "delta_length=$DELTA_LEN" >> "$GITHUB_OUTPUT"
          echo "DELTA_SIGNATURE=$DELTA_SIG" >> "$GITHUB_ENV"
          echo "Delta from build $PREV_BUILD to $BUILD: $DELTA_LEN bytes"

      - name: Update appcast.xml
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
          MIN_OS: ${{ steps.version.outputs.min_os }}
          HAVE_DELTA: ${{ steps.delta.outputs.have_delta }}
          DELTA_FILE: ${{ steps.delta.outputs.delta_file }}
          DELTA_FROM: ${{ steps.delta.outputs.delta_from }}
          DELTA_LENGTH: ${{ steps.delta.outputs.delta_length }}
        run: |
          set -e

          # Pull the release-notes section out of CHANGELOG.md and CDATA-
          # escape it so a stray `]]>` inside the body cannot close the
          # block early. We embed it via $(cat ...) substitution so any
          # `$`/backtick inside the markdown is not re-interpreted by
          # the surrounding heredoc.
          RELEASE_NOTES=$(bash scripts/extract-changelog-section.sh CHANGELOG.md "$VERSION")
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="No release notes recorded for v$VERSION."
          fi
          echo "$RELEASE_NOTES" | sed 's/]]>/]]]]><![CDATA[>/g' > /tmp/release-notes.md

          DELTAS_XML=""
          if [ "$HAVE_DELTA" = "true" ]; then
            DELTAS_XML="<sparkle:deltas>
                          <enclosure
                              url=\"https://github.com/marcelrgberger/auto-brew/releases/download/v$VERSION/$DELTA_FILE\"
                              length=\"$DELTA_LENGTH\"
                              type=\"application/octet-stream\"
                              sparkle:edSignature=\"$DELTA_SIGNATURE\"
                              sparkle:deltaFrom=\"$DELTA_FROM\"
                          />
                      </sparkle:deltas>"
          fi

          cat > appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
              <channel>
                  <title>AutoBrew</title>
                  <link>https://github.com/marcelrgberger/auto-brew</link>
                  <description>AutoBrew update feed</description>
                  <language>en</language>
                  <item>
                      <title>Version $VERSION</title>
                      <pubDate>$(date -R)</pubDate>
                      <sparkle:version>$BUILD</sparkle:version>
                      <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
                      <sparkle:minimumSystemVersion>$MIN_OS</sparkle:minimumSystemVersion>
                      <description><![CDATA[
          $(cat /tmp/release-notes.md)
          ]]></description>
                      <enclosure
                          url="https://github.com/marcelrgberger/auto-brew/releases/download/v$VERSION/AutoBrew.zip"
                          length="$ZIP_LENGTH"
                          type="application/octet-stream"
                          sparkle:edSignature="$SPARKLE_SIGNATURE"
                      />
                      $DELTAS_XML
                  </item>
              </channel>
          </rss>
          EOF
          rm -f /tmp/release-notes.md

          git config user.name "Marcel R. G. Berger"
          git config user.email "hello@marcelrgberger.com"
          git add appcast.xml
          git commit -m "Update appcast for v$VERSION" || true
          git push origin HEAD:main || true

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          HAVE_DELTA: ${{ steps.delta.outputs.have_delta }}
          DELTA_PATH: ${{ steps.delta.outputs.delta_path }}
        run: |
          set -e
          # Compose the release body from the CHANGELOG section so the
          # GitHub Release page mirrors what Sparkle shows in-app. Falls
          # back to the old "see commits" line when the version is not in
          # CHANGELOG.md (an unreleased build, a hand-tagged hotfix, etc.).
          RELEASE_NOTES=$(bash scripts/extract-changelog-section.sh CHANGELOG.md "$VERSION")
          {
            echo "## AutoBrew v$VERSION"
            echo
            echo "Download \`AutoBrew.dmg\`, open it, and drag AutoBrew to Applications."
            echo
            if [ -n "$RELEASE_NOTES" ]; then
              echo "$RELEASE_NOTES"
            else
              echo "See [commits](https://github.com/marcelrgberger/auto-brew/commits/main) for details."
            fi
          } > build/release-notes.md

          RELEASE_ARGS=("build/$APP_NAME.dmg" "build/$APP_NAME.zip")
          if [ "$HAVE_DELTA" = "true" ] && [ -f "$DELTA_PATH" ]; then
            RELEASE_ARGS+=("$DELTA_PATH")
          fi

          gh release create "v$VERSION" \
            --title "AutoBrew v$VERSION" \
            --notes-file build/release-notes.md \
            "${RELEASE_ARGS[@]}"

      - name: Bump Homebrew tap
        if: github.ref == 'refs/heads/main'
        env:
          DEPLOY_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          MIN_OS: ${{ steps.version.outputs.min_os }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_GITHUB_TOKEN:-}" ]; then
            echo "::warning::DEPLOY_GITHUB_TOKEN not set - skipping Homebrew tap bump."
            echo "Add a fine-grained PAT with contents:write on marcelrgberger/homebrew-tap to enable."
            exit 0
          fi

          SHA256=$(shasum -a 256 "build/$APP_NAME.dmg" | awk '{print $1}')
          case "${MIN_OS%%.*}" in
            13) MACOS_SYM=ventura  ;;
            14) MACOS_SYM=sonoma   ;;
            15) MACOS_SYM=sequoia  ;;
            26) MACOS_SYM=tahoe    ;;
            *)  echo "::error::Unsupported macOS major version: ${MIN_OS}"; exit 1 ;;
          esac

          TAP_DIR="$RUNNER_TEMP/homebrew-tap"
          rm -rf "$TAP_DIR"
          git clone --depth=1 \
            "https://x-access-token:${DEPLOY_GITHUB_TOKEN}@github.com/marcelrgberger/homebrew-tap.git" \
            "$TAP_DIR"

          CASK="$TAP_DIR/Casks/autobrew.rb"
          sed -i.bak -E "s#^( *version )\"[^\"]+\"#\1\"${VERSION}\"#"   "$CASK"
          sed -i.bak -E "s#^( *sha256 )\"[^\"]+\"#\1\"${SHA256}\"#"     "$CASK"
          sed -i.bak -E "s#^( *depends_on macos:).*#\1 :${MACOS_SYM}#"  "$CASK"
          rm -f "$CASK.bak"

          cd "$TAP_DIR"
          if git diff --quiet -- Casks/autobrew.rb; then
            echo "Cask already at v${VERSION} with current sha256 - nothing to push."
            exit 0
          fi

          git config user.name  "Marcel R. G. Berger"
          git config user.email "hello@marcelrgberger.com"
          git add Casks/autobrew.rb
          git commit -m "Bump AutoBrew to ${VERSION}"
          git push origin HEAD:main

      - name: Job Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## macOS Build Summary

          | Field | Value |
          |-------|-------|
          | Environment | ${{ needs.determine-environment.outputs.environment }} |
          | Branch | ${{ github.ref_name }} |
          | Version | ${{ steps.version.outputs.version }} (${{ steps.version.outputs.build }}) |
          | Build | ${{ job.status }} |
          SUMMARY

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f "$RUNNER_TEMP/private_keys/"*.p8 || true
