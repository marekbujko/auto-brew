name: 04. Release Build (Main)

on:
  # Manual only — running on every push to main produced a release per
  # commit (including doc-only pushes). Trigger from the Actions tab
  # via Run workflow when an actual release is ready.
  workflow_dispatch:

concurrency:
  group: macos-build-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  APP_NAME: AutoBrew

jobs:
  build:
    name: Build, Sign & Notarize
    if: github.ref == 'refs/heads/main'
    uses: marcelrgberger/ci-open-source/.github/workflows/release-macos-app.yml@v1
    with:
      project: AutoBrew.xcodeproj
      scheme: AutoBrew
      app-identifiers: "za.co.digitalfreedom.AutoBrew,za.co.digitalfreedom.AutoBrew.WidgetExtension,za.co.digitalfreedom.AutoBrew.cli"
      team-id: "7TSZJCJY88"
      match-git-url: "git@github.com:marcelrgberger/apple-certificates.git"
      provisioning-profiles: |
        za.co.digitalfreedom.AutoBrew=AutoBrew Developer ID
        za.co.digitalfreedom.AutoBrew.WidgetExtension=AutoBrew Widget Developer ID
        za.co.digitalfreedom.AutoBrew.cli=AutoBrew CLI Developer ID
      artifact-name: autobrew-app
    secrets:
      keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
      asc-api-key:       ${{ secrets.ASC_API_KEY }}
      asc-api-key-id:    ${{ secrets.ASC_API_KEY_ID }}
      asc-issuer-id:     ${{ secrets.ASC_ISSUER_ID }}
      match-ssh-key:     ${{ secrets.MATCH_SSH_KEY }}
      match-password:    ${{ secrets.MATCH_PASSWORD }}

  release:
    name: Package, Sparkle, Release, Tap
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get version
        id: version
        run: |
          VERSION=$(grep MARKETING_VERSION project.yml | head -1 | awk '{print $2}' | tr -d '"')
          BUILD=$(grep CURRENT_PROJECT_VERSION project.yml | head -1 | awk '{print $2}' | tr -d '"')
          MIN_OS=$(grep MACOSX_DEPLOYMENT_TARGET project.yml | head -1 | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "min_os=$MIN_OS" >> "$GITHUB_OUTPUT"

      - name: Download notarized .app
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: build/export

      - name: Materialize ASC API key (for DMG notarization)
        id: asc
        uses: marcelrgberger/ci-open-source/actions/apple-asc-key@v1
        with:
          key-base64: ${{ secrets.ASC_API_KEY }}
          key-id: ${{ secrets.ASC_API_KEY_ID }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}

      - name: Build DMG
        run: |
          set -euo pipefail
          mkdir -p build/dmg
          cp -R "build/export/$APP_NAME.app" build/dmg/
          ln -s /Applications build/dmg/Applications

          hdiutil create -volname "$APP_NAME" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            "build/$APP_NAME.dmg"

      - name: Code-sign DMG
        uses: marcelrgberger/ci-open-source/actions/macos-codesign-dmg@v1
        with:
          dmg-path: build/AutoBrew.dmg

      - name: Notarize DMG
        uses: marcelrgberger/ci-open-source/actions/macos-notarize@v1
        with:
          bundle-path: build/AutoBrew.dmg
          api-key-path: ${{ steps.asc.outputs.key-path }}
          api-key-id: ${{ steps.asc.outputs.key-id }}
          api-issuer-id: ${{ steps.asc.outputs.issuer-id }}

      - name: Bundle .app as ZIP for Sparkle
        run: |
          ditto -c -k --keepParent "build/export/$APP_NAME.app" "build/$APP_NAME.zip"

      - name: Download Sparkle tools
        id: sparkle-tools
        run: |
          set -euo pipefail
          # Sparkle ships sign_update + BinaryDelta in the release tarball.
          # Use a known-good version rather than depending on DerivedData
          # being populated.
          SPARKLE_VERSION="2.9.0"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar xJ -C "$RUNNER_TEMP"
          echo "bin=$RUNNER_TEMP/bin" >> "$GITHUB_OUTPUT"

      - name: Sign update ZIP for Sparkle
        id: sparkle-zip
        uses: marcelrgberger/ci-open-source/actions/sparkle-sign-appcast@v1
        with:
          private-key-base64: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          artifact-path: build/AutoBrew.zip
          sign-update-tool-path: ${{ steps.sparkle-tools.outputs.bin }}/sign_update

      - name: Generate Sparkle binary delta
        id: delta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
          SPARKLE_BIN: ${{ steps.sparkle-tools.outputs.bin }}
        run: |
          set -euo pipefail
          PREVIOUS_TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 20 \
            --json tagName,isPrerelease \
            --jq "[.[] | select(.isPrerelease == false) | .tagName] | map(select(. != \"v$VERSION\")) | first" \
            2>/dev/null || true)
          if [ -z "${PREVIOUS_TAG:-}" ] || [ "$PREVIOUS_TAG" = "null" ]; then
            echo "No prior stable release — skipping delta."
            echo "have_delta=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Generating delta from $PREVIOUS_TAG"

          mkdir -p build/prev
          if ! gh release download "$PREVIOUS_TAG" --repo "$GITHUB_REPOSITORY" \
              --pattern "AutoBrew.zip" --dir build/prev 2>/dev/null; then
            echo "Previous release has no AutoBrew.zip — skipping delta."
            echo "have_delta=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ditto -xk "build/prev/AutoBrew.zip" "build/prev/extract"
          PREV_APP="build/prev/extract/AutoBrew.app"
          if [ ! -d "$PREV_APP" ]; then
            echo "Previous ZIP missing AutoBrew.app — skipping delta."
            echo "have_delta=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PREV_BUILD=$(defaults read "$PWD/$PREV_APP/Contents/Info" CFBundleVersion)
          if [ "$PREV_BUILD" = "$BUILD" ]; then
            echo "Previous build matches current — skipping delta."
            echo "have_delta=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DELTA_FILE="AutoBrew-${PREV_BUILD}-${BUILD}.delta"
          DELTA_PATH="build/$DELTA_FILE"
          "$SPARKLE_BIN/BinaryDelta" create "$PREV_APP" "build/export/AutoBrew.app" "$DELTA_PATH"

          DELTA_LEN=$(stat -f%z "$DELTA_PATH")
          echo "have_delta=true"          >> "$GITHUB_OUTPUT"
          echo "delta_file=$DELTA_FILE"   >> "$GITHUB_OUTPUT"
          echo "delta_path=$DELTA_PATH"   >> "$GITHUB_OUTPUT"
          echo "delta_from=$PREV_BUILD"   >> "$GITHUB_OUTPUT"
          echo "delta_length=$DELTA_LEN"  >> "$GITHUB_OUTPUT"

      - name: Sign Sparkle delta
        if: steps.delta.outputs.have_delta == 'true'
        id: sparkle-delta
        uses: marcelrgberger/ci-open-source/actions/sparkle-sign-appcast@v1
        with:
          private-key-base64: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          artifact-path: ${{ steps.delta.outputs.delta_path }}
          sign-update-tool-path: ${{ steps.sparkle-tools.outputs.bin }}/sign_update

      - name: Update appcast.xml
        env:
          VERSION:        ${{ steps.version.outputs.version }}
          BUILD:          ${{ steps.version.outputs.build }}
          MIN_OS:         ${{ steps.version.outputs.min_os }}
          ZIP_SIG:        ${{ steps.sparkle-zip.outputs.signature }}
          ZIP_LEN:        ${{ steps.sparkle-zip.outputs.length }}
          HAVE_DELTA:     ${{ steps.delta.outputs.have_delta }}
          DELTA_FILE:     ${{ steps.delta.outputs.delta_file }}
          DELTA_FROM:     ${{ steps.delta.outputs.delta_from }}
          DELTA_LEN:      ${{ steps.delta.outputs.delta_length }}
          DELTA_SIG:      ${{ steps.sparkle-delta.outputs.signature }}
        run: |
          set -euo pipefail

          RELEASE_NOTES=$(bash scripts/extract-changelog-section.sh CHANGELOG.md "$VERSION")
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="No release notes recorded for v$VERSION."
          fi
          echo "$RELEASE_NOTES" | sed 's/]]>/]]]]><![CDATA[>/g' > /tmp/release-notes.md

          DELTAS_XML=""
          if [ "$HAVE_DELTA" = "true" ]; then
            DELTAS_XML="<sparkle:deltas>
                          <enclosure
                              url=\"https://github.com/marcelrgberger/auto-brew/releases/download/v$VERSION/$DELTA_FILE\"
                              length=\"$DELTA_LEN\"
                              type=\"application/octet-stream\"
                              sparkle:edSignature=\"$DELTA_SIG\"
                              sparkle:deltaFrom=\"$DELTA_FROM\"
                          />
                      </sparkle:deltas>"
          fi

          cat > appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
              <channel>
                  <title>AutoBrew</title>
                  <link>https://github.com/marcelrgberger/auto-brew</link>
                  <description>AutoBrew update feed</description>
                  <language>en</language>
                  <item>
                      <title>Version $VERSION</title>
                      <pubDate>$(date -R)</pubDate>
                      <sparkle:version>$BUILD</sparkle:version>
                      <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
                      <sparkle:minimumSystemVersion>$MIN_OS</sparkle:minimumSystemVersion>
                      <description><![CDATA[
          $(cat /tmp/release-notes.md)
          ]]></description>
                      <enclosure
                          url="https://github.com/marcelrgberger/auto-brew/releases/download/v$VERSION/AutoBrew.zip"
                          length="$ZIP_LEN"
                          type="application/octet-stream"
                          sparkle:edSignature="$ZIP_SIG"
                      />
                      $DELTAS_XML
                  </item>
              </channel>
          </rss>
          EOF
          rm -f /tmp/release-notes.md

          git config user.name "Marcel R. G. Berger"
          git config user.email "hello@marcelrgberger.com"
          git add appcast.xml
          git commit -m "Update appcast for v$VERSION" || true
          git push origin HEAD:main || true

      - name: Create GitHub Release
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          VERSION:     ${{ steps.version.outputs.version }}
          HAVE_DELTA:  ${{ steps.delta.outputs.have_delta }}
          DELTA_PATH:  ${{ steps.delta.outputs.delta_path }}
        run: |
          set -euo pipefail
          RELEASE_NOTES=$(bash scripts/extract-changelog-section.sh CHANGELOG.md "$VERSION")
          {
            echo "## AutoBrew v$VERSION"
            echo
            echo "Download \`AutoBrew.dmg\`, open it, and drag AutoBrew to Applications."
            echo
            if [ -n "$RELEASE_NOTES" ]; then
              echo "$RELEASE_NOTES"
            else
              echo "See [commits](https://github.com/marcelrgberger/auto-brew/commits/main) for details."
            fi
          } > build/release-notes.md

          RELEASE_ARGS=("build/$APP_NAME.dmg" "build/$APP_NAME.zip")
          if [ "$HAVE_DELTA" = "true" ] && [ -f "$DELTA_PATH" ]; then
            RELEASE_ARGS+=("$DELTA_PATH")
          fi

          gh release create "v$VERSION" \
            --title "AutoBrew v$VERSION" \
            --notes-file build/release-notes.md \
            "${RELEASE_ARGS[@]}"

      - name: Bump Homebrew tap
        env:
          DEPLOY_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          VERSION:             ${{ steps.version.outputs.version }}
          MIN_OS:              ${{ steps.version.outputs.min_os }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_GITHUB_TOKEN:-}" ]; then
            echo "::warning::DEPLOY_GITHUB_TOKEN not set - skipping Homebrew tap bump."
            exit 0
          fi

          SHA256=$(shasum -a 256 "build/$APP_NAME.dmg" | awk '{print $1}')
          case "${MIN_OS%%.*}" in
            13) MACOS_SYM=ventura  ;;
            14) MACOS_SYM=sonoma   ;;
            15) MACOS_SYM=sequoia  ;;
            26) MACOS_SYM=tahoe    ;;
            *)  echo "::error::Unsupported macOS major version: ${MIN_OS}"; exit 1 ;;
          esac

          TAP_DIR="$RUNNER_TEMP/homebrew-tap"
          rm -rf "$TAP_DIR"
          git clone --depth=1 \
            "https://x-access-token:${DEPLOY_GITHUB_TOKEN}@github.com/marcelrgberger/homebrew-tap.git" \
            "$TAP_DIR"

          CASK="$TAP_DIR/Casks/autobrew.rb"
          sed -i.bak -E "s#^( *version )\"[^\"]+\"#\1\"${VERSION}\"#"   "$CASK"
          sed -i.bak -E "s#^( *sha256 )\"[^\"]+\"#\1\"${SHA256}\"#"     "$CASK"
          sed -i.bak -E "s#^( *depends_on macos:).*#\1 :${MACOS_SYM}#"  "$CASK"
          rm -f "$CASK.bak"

          cd "$TAP_DIR"
          if git diff --quiet -- Casks/autobrew.rb; then
            echo "Cask already at v${VERSION} with current sha256."
            exit 0
          fi

          git config user.name  "Marcel R. G. Berger"
          git config user.email "hello@marcelrgberger.com"
          git add Casks/autobrew.rb
          git commit -m "Bump AutoBrew to ${VERSION}"
          git push origin HEAD:main

      - name: Job Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
          ## macOS Release Build Summary

          | Field | Value |
          |-------|-------|
          | Branch | ${{ github.ref_name }} |
          | Version | ${{ steps.version.outputs.version }} (${{ steps.version.outputs.build }}) |
          | Status | ${{ job.status }} |
          SUMMARY
