name: 02. Build, Notarize & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: macos-build-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  APP_NAME: AutoBrew
  SCHEME: AutoBrew

jobs:
  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.determine.outputs.environment }}
    steps:
      - name: Determine environment
        id: determine
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          case "$BRANCH" in
            main)   echo "environment=prod" >> "$GITHUB_OUTPUT" ;;
            *)      echo "environment=dev" >> "$GITHUB_OUTPUT" ;;
          esac

  build:
    name: Build, Sign & Notarize
    runs-on: macos-15
    timeout-minutes: 30
    needs: determine-environment
    steps:
      - name: Set up Xcode ^26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '^26'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          bash scripts/patch-localizations.sh || true

      - name: Get version
        id: version
        run: |
          VERSION=$(grep MARKETING_VERSION project.yml | head -1 | awk '{print $2}' | tr -d '"')
          BUILD=$(grep CURRENT_PROJECT_VERSION project.yml | head -1 | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

      - name: Install Developer ID Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_GITHUB_KEYCHAIN_PASSWORD }}
        run: |
          set -e
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v
          echo "Developer ID certificate imported."

      - name: Prepare App Store Connect API Key
        env:
          API_KEY_BASE64: ${{ secrets.MACOS_APPSTORE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.MACOS_APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.MACOS_APPSTORE_API_ISSUER_ID }}
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo -n "$API_KEY_BASE64" | base64 --decode \
            > "$RUNNER_TEMP/private_keys/AuthKey_${API_KEY_ID}.p8"
          echo "API_KEY_PATH=$RUNNER_TEMP/private_keys/AuthKey_${API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$APP_NAME.xcodeproj" \
            -scheme "$SCHEME"

      - name: Archive
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project "$APP_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'platform=macOS' \
            -archivePath "build/$APP_NAME.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID"

      - name: Export app
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > build/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "build/$APP_NAME.xcarchive" \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Notarize app
        env:
          API_KEY_ID: ${{ secrets.MACOS_APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.MACOS_APPSTORE_API_ISSUER_ID }}
        run: |
          set -e
          APP_PATH="build/export/$APP_NAME.app"
          ditto -c -k --keepParent "$APP_PATH" "build/$APP_NAME.zip"

          xcrun notarytool submit "build/$APP_NAME.zip" \
            --key "$API_KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        env:
          API_KEY_ID: ${{ secrets.MACOS_APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.MACOS_APPSTORE_API_ISSUER_ID }}
        run: |
          set -e
          mkdir -p build/dmg
          cp -R "build/export/$APP_NAME.app" build/dmg/
          ln -s /Applications build/dmg/Applications

          hdiutil create -volname "$APP_NAME" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            "build/$APP_NAME.dmg"

          xcrun notarytool submit "build/$APP_NAME.dmg" \
            --key "$API_KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait

          xcrun stapler staple "build/$APP_NAME.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AutoBrew-${{ steps.version.outputs.version }}
          path: |
            build/AutoBrew.dmg
            build/AutoBrew.zip

      - name: Sign update for Sparkle
        if: github.ref == 'refs/heads/main'
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -e
          # Get Sparkle tools from SPM cache
          SPARKLE_BIN=$(find "$HOME/Library/Developer/Xcode/DerivedData" -name "sign_update" -path "*/Sparkle/bin/*" 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            echo "sign_update not found, downloading Sparkle tools..."
            curl -sL "https://github.com/sparkle-project/Sparkle/releases/latest/download/Sparkle-2.9.0.tar.xz" | tar xJ -C /tmp
            SPARKLE_BIN="/tmp/bin/sign_update"
          fi

          # Sign the ZIP
          echo "$SPARKLE_KEY" > /tmp/sparkle_key
          SIGNATURE=$("$SPARKLE_BIN" "build/$APP_NAME.zip" --ed-key-file /tmp/sparkle_key 2>&1 | grep "sparkle:edSignature" | sed 's/.*sparkle:edSignature="\([^"]*\)".*/\1/')
          LENGTH=$(stat -f%z "build/$APP_NAME.zip")
          rm -f /tmp/sparkle_key

          echo "SPARKLE_SIGNATURE=$SIGNATURE" >> "$GITHUB_ENV"
          echo "ZIP_LENGTH=$LENGTH" >> "$GITHUB_ENV"

      - name: Update appcast.xml
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
        run: |
          set -e
          cat > appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
              <channel>
                  <title>AutoBrew</title>
                  <link>https://github.com/marcelrgberger/auto-brew</link>
                  <description>AutoBrew update feed</description>
                  <language>en</language>
                  <item>
                      <title>Version $VERSION</title>
                      <pubDate>$(date -R)</pubDate>
                      <sparkle:version>$BUILD</sparkle:version>
                      <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
                      <sparkle:minimumSystemVersion>26.0</sparkle:minimumSystemVersion>
                      <enclosure
                          url="https://github.com/marcelrgberger/auto-brew/releases/download/v$VERSION/AutoBrew.zip"
                          length="$ZIP_LENGTH"
                          type="application/octet-stream"
                          sparkle:edSignature="$SPARKLE_SIGNATURE"
                      />
                  </item>
              </channel>
          </rss>
          EOF

          git config user.name "Marcel R. G. Berger"
          git config user.email "hello@marcelrgberger.com"
          git add appcast.xml
          git commit -m "Update appcast for v$VERSION" || true
          git push origin HEAD:main || true

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "AutoBrew v$VERSION" \
            --notes "## AutoBrew v$VERSION

          Download \`AutoBrew.dmg\`, open it, and drag AutoBrew to Applications.

          See [commits](https://github.com/marcelrgberger/auto-brew/commits/main) for details." \
            "build/$APP_NAME.dmg" \
            "build/$APP_NAME.zip"

      - name: Job Summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## macOS Build Summary

          | Field | Value |
          |-------|-------|
          | Environment | ${{ needs.determine-environment.outputs.environment }} |
          | Branch | ${{ github.ref_name }} |
          | Version | ${{ steps.version.outputs.version }} (${{ steps.version.outputs.build }}) |
          | Build | ${{ job.status }} |
          SUMMARY

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f "$RUNNER_TEMP/private_keys/"*.p8 || true
