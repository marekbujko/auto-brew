name: AutoBrew
options:
  bundleIdPrefix: za.co.digitalfreedom
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26"
  minimumXcodeGenVersion: "2.42.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  defaultConfig: Debug
  knownRegions:
    - en
    - de
    - fr
    - it
    - nl
    - pl
    - pt-BR
    - es
    - Base

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

settings:
  base:
    MARKETING_VERSION: "2.5.2"
    CURRENT_PROJECT_VERSION: "17"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 7TSZJCJY88
    PRODUCT_BUNDLE_IDENTIFIER: za.co.digitalfreedom.AutoBrew
    PRODUCT_NAME: AutoBrew
    INFOPLIST_FILE: AutoBrew/Info.plist
    CODE_SIGN_ENTITLEMENTS: AutoBrew/AutoBrew.entitlements
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_HARDENED_RUNTIME: true

targets:
  AutoBrew:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: AutoBrew/Localizable.xcstrings
        buildPhase: resources
      - path: AutoBrew/Assets.xcassets
        buildPhase: resources
      - path: AutoBrew/en.lproj
        buildPhase: resources
      - path: AutoBrew/de.lproj
        buildPhase: resources
      - path: AutoBrew/fr.lproj
        buildPhase: resources
      - path: AutoBrew/it.lproj
        buildPhase: resources
      - path: AutoBrew/nl.lproj
        buildPhase: resources
      - path: AutoBrew/pl.lproj
        buildPhase: resources
      - path: AutoBrew/pt-BR.lproj
        buildPhase: resources
      - path: AutoBrew/es.lproj
        buildPhase: resources
    dependencies:
      - package: Sparkle
      - target: AutoBrewWidget
        embed: true
        codeSign: true
      - target: autobrew-cli
        embed: true
        codeSign: true
        copy:
          destination: wrapper
          subpath: Contents/Helpers
    settings:
      base:
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        PROVISIONING_PROFILE_SPECIFIER: "AutoBrew Developer ID"
    scheme:
      testTargets:
        - AutoBrewTests
      environmentVariables:
        - variable: AUTOBREW_DEBUG
          value: "1"
          isEnabled: true

  AutoBrewWidget:
    type: app-extension
    platform: macOS
    sources:
      - WidgetExtension
      - path: Sources/Models/WidgetState.swift
      - path: Sources/Models/CaskUpgradeOutcome.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: za.co.digitalfreedom.AutoBrew.WidgetExtension
        PRODUCT_NAME: AutoBrewWidget
        INFOPLIST_FILE: WidgetExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: WidgetExtension/AutoBrewWidget.entitlements
        ENABLE_HARDENED_RUNTIME: true
        PROVISIONING_PROFILE_SPECIFIER: "AutoBrew Widget Developer ID"
        # Extensions are always sandboxed on macOS even when the host app
        # is not — the App Group is what bridges the two.
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: false
        SKIP_INSTALL: true

  autobrew-cli:
    type: tool
    platform: macOS
    sources:
      - CLI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: za.co.digitalfreedom.AutoBrew.cli
        PRODUCT_NAME: autobrew
        INFOPLIST_FILE: CLI/Info.plist
        ENABLE_HARDENED_RUNTIME: true
        SKIP_INSTALL: true
        PRODUCT_MODULE_NAME: AutoBrewHelperCLI

  AutoBrewTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: AutoBrew
    settings:
      base:
        PRODUCT_MODULE_NAME: AutoBrewTests
        PRODUCT_NAME: AutoBrewTests
