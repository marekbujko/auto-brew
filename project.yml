name: AutoBrew
options:
  bundleIdPrefix: za.co.digitalfreedom
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26"
  minimumXcodeGenVersion: "2.42.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  defaultConfig: Debug
  knownRegions:
    - en
    - de
    - fr
    - it
    - nl
    - pl
    - pt-BR
    - es
    - Base

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

settings:
  base:
    MARKETING_VERSION: "2.1.0"
    CURRENT_PROJECT_VERSION: "9"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 7TSZJCJY88
    PRODUCT_BUNDLE_IDENTIFIER: za.co.digitalfreedom.AutoBrew
    PRODUCT_NAME: AutoBrew
    INFOPLIST_FILE: AutoBrew/Info.plist
    CODE_SIGN_ENTITLEMENTS: AutoBrew/AutoBrew.entitlements
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_HARDENED_RUNTIME: true

targets:
  AutoBrew:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: AutoBrew/Localizable.xcstrings
        buildPhase: resources
      - path: AutoBrew/Assets.xcassets
        buildPhase: resources
      - path: AutoBrew/en.lproj
        buildPhase: resources
      - path: AutoBrew/de.lproj
        buildPhase: resources
      - path: AutoBrew/fr.lproj
        buildPhase: resources
      - path: AutoBrew/it.lproj
        buildPhase: resources
      - path: AutoBrew/nl.lproj
        buildPhase: resources
      - path: AutoBrew/pl.lproj
        buildPhase: resources
      - path: AutoBrew/pt-BR.lproj
        buildPhase: resources
      - path: AutoBrew/es.lproj
        buildPhase: resources
    dependencies:
      - package: Sparkle
    settings:
      base:
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    scheme:
      testTargets:
        - AutoBrewTests
      environmentVariables:
        - variable: AUTOBREW_DEBUG
          value: "1"
          isEnabled: true

  AutoBrewTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: AutoBrew
    settings:
      base:
        PRODUCT_MODULE_NAME: AutoBrewTests
